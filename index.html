<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rodina My Love ❤️</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Dancing+Script:wght@700&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }
body { background:#05000a; color:#fff; font-family:'Cairo', sans-serif; overflow:hidden; height:100vh; display:flex; align-items:center; justify-content:center; cursor:pointer; }

#starField { position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1; }

.glass-card {
    background:rgba(255,255,255,0.05); backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.1); padding:25px; border-radius:25px;
    text-align:center; width:90%; max-width:350px; position:relative; z-index:10;
}

.name-title { font-family:'Dancing Script',cursive; font-size:50px; color:#ff2d75; text-shadow:0 0 20px #ff2d75; margin-bottom:10px; }

/* الصندوق الوردي اللي في الصورة */
.envelope-box {
    background:#ff2d75; width:100%; height:180px; border-radius:15px;
    display:flex; align-items:center; justify-content:center; margin-bottom:20px;
    box-shadow:0 10px 20px rgba(255,45,117,0.3); transition:0.5s; position:relative;
}

.envelope-box span { font-size:60px; }

/* الورقة اللي هتظهر جوه الصندوق */
#letterContent {
    display:none; color:#fff; font-size:16px; line-height:1.6; animation: fadeIn 1s;
}

button {
    background:rgba(255,45,117,0.2); border:1px solid #ff2d75; color:#fff;
    padding:12px 25px; border-radius:50px; cursor:pointer; width:100%;
    font-weight:bold; transition:0.3s;
}
button:hover { background:#ff2d75; transform:scale(1.05); }

@keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

.falling { position:absolute; pointer-events:none; z-index:5; animation:fall linear forwards; color:#ff2d75; }
@keyframes fall { to { transform:translateY(110vh) rotate(360deg); } }
</style>
</head>
<body onclick="playMusic()">

<canvas id="starField"></canvas>
<div id="player" style="display:none"></div>

<div class="glass-card">
    <h1 class="name-title">Rodina</h1>
    
    <div class="envelope-box" id="mailBox">
        <span id="mailIcon">✉️</span>
        <div id="letterContent">
            بقالنا مع بعض 185 يوم.. <br>
            كل ثانية فيهم كنتي أنتي النور اللي في حياتي. <br>
            بعشقك يا رودينا ❤️
        </div>
    </div>

    <div id="counterArea">
        <div id="loveCounter" style="color:#ff8aa8; font-weight:bold; margin-bottom:15px;"></div>
    </div>

    <button id="openBtn" onclick="openLetter()">📩 افتحي جوابي ليكي</button>
    <div style="font-size:10px; color:#555; margin-top:15px;">Developer: sameh</div>
</div>

<script>
// تشغيل الموسيقى والنجوم
function playMusic() {
    if(!window.musicPlayed) {
        document.getElementById('player').innerHTML = `<iframe src="https://www.youtube.com/embed/T0AA8GvHzhY?autoplay=1&loop=1&playlist=T0AA8GvHzhY" allow="autoplay"></iframe>`;
        window.musicPlayed = true;
        startHearts();
    }
}

// وظيفة فتح الجواب
function openLetter() {
    // إخفاء الأيقونة وإظهار الكلام
    document.getElementById('mailIcon').style.display = 'none';
    document.getElementById('letterContent').style.display = 'block';
    // تغيير الزرار
    document.getElementById('openBtn').innerHTML = "بموت فيكي ❤️";
    document.getElementById('openBtn').style.background = "#ff2d75";
    
    // انفجار قلوب
    for(let i=0; i<30; i++) {
        createHeart();
    }
}

// العداد (من 1 أكتوبر 2025)
function updateCounter(){
    const startDate = new Date('2025-10-01T00:00:00');
    const diff = new Date() - startDate;
    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff / 3600000) % 24);
    const m = Math.floor((diff / 60000) % 60);
    const s = Math.floor((diff / 1000) % 60);
    document.getElementById('loveCounter').innerHTML = `${d} يوم و ${h}:${m}:${s}`;
}
setInterval(updateCounter, 1000);
updateCounter();

// قلوب بتطير
function createHeart() {
    const h = document.createElement('div');
    h.className = 'falling';
    h.innerHTML = '❤️';
    h.style.left = Math.random() * 100 + 'vw';
    h.style.top = '-20px';
    h.style.fontSize = (Math.random() * 20 + 15) + 'px';
    h.style.animationDuration = (Math.random() * 3 + 2) + 's';
    document.body.appendChild(h);
    setTimeout(() => h.remove(), 4000);
}

function startHearts() {
    setInterval(createHeart, 600);
}

// خلفية النجوم
const canvas = document.getElementById('starField');
const ctx = canvas.getContext('2d');
let stars = [];
function initStars() {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    stars = [];
    for(let i=0; i<100; i++) stars.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, s:Math.random()*1.5});
}
function drawStars() {
    ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle="#fff";
    stars.forEach(s => { ctx.beginPath(); ctx.arc(s.x,s.y,s.s,0,Math.PI*2); ctx.fill(); s.y+=0.2; if(s.y>canvas.height)s.y=0; });
    requestAnimationFrame(drawStars);
}
initStars(); drawStars();
</script>
</body>
</html>
