<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rodina My Love ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Dancing+Script:wght@700&display=swap');

        body {
            margin: 0;
            padding: 0;
            background: #0a0a0a;
            color: #fff;
            font-family: 'Cairo', sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        #starField {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 90%;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3rem;
            color: #ff2d75;
            margin-bottom: 10px;
            text-shadow: 0 0 15px #ff2d75;
        }

        .counter {
            font-size: 1.5rem;
            margin: 20px 0;
            font-weight: bold;
            color: #ff8aa8;
        }

        .message {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .heart {
            font-size: 50px;
            animation: pulse 1.5s infinite;
            display: inline-block;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .falling-heart {
            position: absolute;
            color: #ff2d75;
            pointer-events: none;
            z-index: 999;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        #player { display: none; }
    </style>
</head>
<body onclick="startEffects()">

    <canvas id="starField"></canvas>
    
    <div id="musicContainer"></div>

    <div class="container">
        <div class="heart">❤️</div>
        <h1>Rodina</h1>
        <div class="message">بقالنا مع بعض يا روحي:</div>
        <div id="loveCounter" class="counter"></div>
        <div class="message">
            انتي أجمل حاجة حصلت في حياتي من يوم ما عرفتك في شهر 10.<br>
            بحبك يا رودينا ❤️
        </div>
        <div style="font-size: 10px; color: #555; margin-top: 10px;">Developer: sameh</div>
    </div>

    <script>
        // العداد من 1 أكتوبر 2025
        function updateCounter() {
            const startDate = new Date('2025-10-01T00:00:00');
            const now = new Date();
            const diff = now - startDate;

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const minutes = Math.floor((diff / (1000 * 60)) % 60);
            const seconds = Math.floor((diff / 1000) % 60);

            document.getElementById('loveCounter').innerHTML = 
                days + " يوم و " + hours + ":" + minutes + ":" + seconds;
        }

        setInterval(updateCounter, 1000);
        updateCounter();

        // خلفية النجوم
        const canvas = document.getElementById('starField');
        const ctx = canvas.getContext('2d');
        let stars = [];

        function initStars() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            stars = [];
            for(let i=0; i<150; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2,
                    speed: Math.random() * 0.5
                });
            }
        }

        function drawStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#fff";
            stars.forEach(star => {
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
                star.y += star.speed;
                if(star.y > canvas.height) star.y = 0;
            });
            requestAnimationFrame(drawStars);
        }

        initStars();
        drawStars();

        // تشغيل الموسيقى والقلوب عند أول لمسة
        let started = false;
        function startEffects() {
            if (!started) {
                // تشغيل الأغنية
                document.getElementById('musicContainer').innerHTML = `
                    <iframe src="https://www.youtube.com/embed/T0AA8GvHzhY?autoplay=1&loop=1&playlist=T0AA8GvHzhY" 
                    allow="autoplay" style="display:none;"></iframe>`;
                
                // مطر القلوب
                setInterval(() => {
                    const heart = document.createElement('div');
                    heart.className = 'falling-heart';
                    heart.innerHTML = '❤️';
                    heart.style.left = Math.random() * 100 + 'vw';
                    heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
                    heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
                    document.body.appendChild(heart);
                    setTimeout(() => heart.remove(), 5000);
                }, 3000);
                
                started = true;
            }
        }

        window.addEventListener('resize', initStars);
    </script>
</body>
</html>
